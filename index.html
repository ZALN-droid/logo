<!DOCTYPE html>
<html>
<head>
<style>

body{
    margin:0;
    padding:0;
    height:100%;
    width: 100%;
    background:white;
    overflow:hidden;
}

/* center reference */
.scene{
    position:absolute;
    top:100%;
    left:100%;
    transform: translate (-50%, -50%);
    width: 100%;
    height: 100%;
}

/* shared styles */
.piece{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
}

/* image size scales with screen */
.piece img{
    width:clamp(180px, 30vw, 350px)
}

/* LEFT */
.left-piece{
    left:50%;
    animation:moveLeft 2s forwards ease;
}

/* RIGHT */
.right-piece{
    left:50%;
    animation:moveRight 2s forwards ease;
}

/* responsive motion */
@keyframes moveLeft{
    from{
        transform:translate(-150%, -50%);
    }
    to{
        transform:translate(-55%, -50%);
    }
}

@keyframes moveRight{
    from{
        transform:translate(150%, -50%);
    }
    to{
        transform:translate(-45%, -50%);
    }
}

</style>
</head>

<body>

<div class="scene">

    <div class="piece left-piece">
        <img src="left.png">
    </div>

    <div class="piece right-piece">
        <img src="right.png">
    </div>

</div>

</body>
</html>

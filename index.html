<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Intro</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      background: white;
    }

    .stage {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    .image {
      position: absolute;
      top: 50%;
      width: 220px;
      height: 220px;
      object-fit: cover;
      border-radius: 16px;
      transform: translateY(-50%);
      animation-duration: 2s;
      animation-timing-function: ease-in-out;
      animation-fill-mode: forwards;
    }

    .left-image {
      left: -260px;
      animation-name: slideFromLeft;
    }

    .right-image {
      right: -260px;
      animation-name: slideFromRight;
    }

    @keyframes slideFromLeft {
      to { left: calc(60% - 220px); }
    }

    @keyframes slideFromRight {
      to { right: calc(60% - 220px); }
    }

    /* ENTER BUTTON */
    .enter-btn {
      position: absolute;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 20px;
      border: 1px solid #000;
      background: transparent;
      cursor: pointer;
      font-family: Arial, sans-serif;
      letter-spacing: 2px;
    }

    .enter-btn a {
      text-decoration: none;
      color: black;
    }

  </style>
</head>

<body>

  <div class="stage">

    <img src="left.png" class="image left-image" />
    <img src="right.png" class="image right-image" />

    <div class="enter-btn">
      <a href="index.html">ENTER</a>
    </div>

  </div>

</body>
</html>

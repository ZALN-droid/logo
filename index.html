<!DOCTYPE html>
<html>
<head>
<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:white;
    overflow:hidden;
}

/* center reference */
.scene{
    position:relative;
    width:100vw;
    height:100vh;
}

/* shared styles */
.piece{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
}

/* image size scales with screen */
.piece img{
    width:25vw; /* responsive instead of fixed px */
    max-width:350px;
    min-width:180px;
    display:block;
}

/* LEFT */
.left-piece{
    left:50%;
    animation:moveLeft 2s forwards ease;
}

/* RIGHT */
.right-piece{
    left:50%;
    animation:moveRight 2s forwards ease;
}

/* responsive motion */
@keyframes moveLeft{
    from{
        transform:translate(-150%, -50%);
    }
    to{
        transform:translate(-55%, -50%);
    }
}

@keyframes moveRight{
    from{
        transform:translate(150%, -50%);
    }
    to{
        transform:translate(-45%, -50%);
    }
}

</style>
</head>

<body>

<div class="scene">

    <div class="piece left-piece">
        <img src="left.png">
    </div>

    <div class="piece right-piece">
        <img src="right.png">
    </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Images Meet in Center</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      background: white;
      font-family: Arial, sans-serif;
    }

    .stage {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    .image {
      position: absolute;
      top: 50%;
      width: 220px;
      height: 220px;
      object-fit: cover;
      border-radius: 16px;
      transform: translateY(-50%);
      animation-duration: 2s;
      animation-timing-function: ease-in-out;
      animation-fill-mode: forwards;
    }

    .left-image {
      left: -260px;
      animation-name: slideFromLeft;
    }

    .right-image {
      right: -260px;
      animation-name: slideFromRight;
    }

    @keyframes slideFromLeft {
      from {
        left: -260px;
      }
      to {
        left: calc(50% - 220px);
      }
    }

    @keyframes slideFromRight {
      from {
        right: -260px;
      }
      to {
        right: calc(50% - 220px);
      }
    }

    .title {
      position: absolute;
      top: 12%;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      font-size: 2rem;
      font-weight: bold;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  

    <img
      src="left.png"
      alt="Left side image"
      class="image left-image"
    />

    <img
      src="right.png"
      alt="Right side image"
      class="image right-image"
    />
  </div>
</body>
</html>

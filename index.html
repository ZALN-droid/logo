<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logo Assembly</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100vw;
    height:100vh;
    overflow:hidden;
    background:white;
}

/* Final assembled logo area */
.logo{
    position:absolute;
    top:50%;
    left:50%;
    width:500px;   /* width of completed shape */
    height:250px;  /* height of completed shape */
    transform:translate(-50%,-50%);
}

/* Common image styling */
.logo img{
    position:absolute;
    top:0;
    height:250px;
    object-fit:contain;
}

/* LEFT PIECE */
.left{
    width:200px;

    /* Final position */
    left:0;

    /* Start off-screen */
    transform:translateX(-1200px);

    animation:slideLeft 2s ease-out forwards;
}

/* RIGHT PIECE */
.right{
    width:350px;
    border: 1px solid red

    /* Final position */
    left:150px;

    /* Start off-screen */
    transform:translateX(1200px);

    animation:slideRight 2s ease-out forwards;
}

@keyframes slideLeft{
    to{
        transform:translateX(0);
    }
}

@keyframes slideRight{
    to{
        transform:translateX(0);
    }
}

</style>
</head>

<body>

<div class="logo">
    <img src="left.png" class="left" alt="">
    <img src="right.png" class="right" alt="">
</div>

</body>
</html>

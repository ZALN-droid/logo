<!DOCTYPE html>
<html>
<head>
<style>

body{
    margin:0;
    height:100%;
    background:white;
    overflow:hidden;
}

/* TRUE CENTER ANCHOR */
.scene{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    width:600px;
    height:300px;
}

/* PIECES */
.piece{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
}

.piece img{
    width:300px;
    display:block;
}

/* LEFT PIECE */
.left{
    right:50%; /* anchor from center going left */
    animation:moveLeft 2s forwards ease;
}

/* RIGHT PIECE */
.right{
    left:50%; /* anchor from center going right */
    animation:moveRight 2s forwards ease;
}

/* FINAL POSITIONS */
@keyframes moveLeft{
    from{
        transform:translate(100%, -50%);
    }
    to{
        transform:translate(0%, -50%);
    }
}

@keyframes moveRight{
    from{
        transform:translate(-100%, -50%);
    }
    to{
        transform:translate(0%, -50%);
    }
}

</style>
</head>

<body>

<div class="scene">

    <div class="piece left">
        <img src="left.png">
    </div>

    <div class="piece right">
        <img src="right.png">
    </div>

</div>

</body>
</html>

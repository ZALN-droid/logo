<!DOCTYPE html>
<html>
<head>
<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:white;
    overflow:hidden;
}

.scene{
    position:relative;
    width:800px;
    height:500px;
}

/* Invisible containers */
.left-piece,
.right-piece{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
}

.left-piece{
    animation:slideLeft 2s forwards;
}

.right-piece{
    animation:slideRight 2s forwards;
}

/* PNG images */
.left-piece img,
.right-piece img{
    width:350px;
    display:block;
}

@keyframes slideLeft{
    from{
        left:-400px;
    }
    to{
        left:160px; /* Adjust this */
    }
}

@keyframes slideRight{
    from{
        left:900px;
    }
    to{
        left:300px; /* Adjust this */
    }
}
</style>
</head>
<body>

<div class="scene">

    <div class="left-piece">
        <img src="left.png">
    </div>

    <div class="right-piece">
        <img src="right.png">
    </div>

</div>

</body>
</html>
